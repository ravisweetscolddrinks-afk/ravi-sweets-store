<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a2a1b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ravi Sweets</title>
    <script>
      // Early intercept of PWA installation prompt to prevent race conditions in React
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // Notify React application if it is already initialized and listening
        window.dispatchEvent(new CustomEvent('deferredpromptready'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
